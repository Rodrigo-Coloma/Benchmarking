# /etc/nginx/snippets/benchmarking.locations.conf
#
# Pega ESTE fichero dentro del `server { ... }` que sirve rcoloma.dev en el
# Nginx del host. Mismo patrón que los snippets de edc-mvp.conf / medlit.conf
# que ya tienes en cvmachine.
#
# No contiene `listen`, ni `server_name`, ni `ssl_certificate` — hereda los
# del vhost en el que se incluya. Compatible con CF en modo "Flexible"
# (origin HTTP) porque ya forzamos X-Forwarded-Proto=https al backend, y
# Express está configurado con `trust proxy = 1`.

# Frontend (Vite build servido por nginx alpine dentro del contenedor "web").
# El contenedor expone sólo 127.0.0.1:8081 (ver docker-compose.prod.yml).
location /evidencias/ {
    client_max_body_size 15M;          # plantillas xlsx hasta 10 MB + margen
    proxy_pass http://127.0.0.1:8081/evidencias/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
}

# API (Express + pg-boss). proxy_buffering off para SSE de jobs.
location /evidencias/api/ {
    client_max_body_size 15M;
    proxy_pass http://127.0.0.1:8080/evidencias/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";

    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
}
