# /etc/nginx/sites-available/rcoloma.dev.conf
#
# Termina TLS con el Cloudflare Origin Cert y hace reverse-proxy a los
# contenedores `web` (8081) y `api` (8080) que SOLO escuchan en 127.0.0.1.
# (V3 §4.5)

upstream am_web {
    server 127.0.0.1:8081;
    keepalive 16;
}
upstream am_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rcoloma.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rcoloma.dev;

    ssl_certificate     /etc/ssl/cloudflare/rcoloma.dev.pem;
    ssl_certificate_key /etc/ssl/cloudflare/rcoloma.dev.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Authenticated Origin Pulls — Cloudflare se identifica con su client cert
    # frente al origen. Descomentar tras descargar el CA cert.
    # ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    # ssl_verify_client on;

    # HSTS — activar sólo cuando el dominio sea estable.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload máximo (Excel hasta 10 MB + margen).
    client_max_body_size 15M;

    # ----- Frontend bajo /evidencias -----
    location /evidencias/ {
        proxy_pass http://am_web/evidencias/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # ----- API -----
    location /evidencias/api/ {
        proxy_pass http://am_api/evidencias/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        # Streaming para SSE de jobs.
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Comodidad: / → /evidencias/
    location = / {
        return 302 /evidencias/;
    }

    # Healthcheck público (sin auth) para monitorización externa.
    location = /healthz {
        proxy_pass http://am_api/evidencias/api/healthz;
        access_log off;
    }

    access_log /var/log/nginx/rcoloma.dev.access.log combined;
    error_log  /var/log/nginx/rcoloma.dev.error.log warn;
}
