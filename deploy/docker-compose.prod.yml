name: benchmarking

# Overrides para producción. Aplica después del compose base:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# Decisiones (V3 §4):
#   - Postgres NUNCA expone puerto al host (sólo accesible vía red docker).
#   - api y web exponen sólo en 127.0.0.1 para que el Nginx del host
#     (no este compose) sea el único acceso público.
#   - `restart: unless-stopped` en todo.

services:
  postgres:
    restart: unless-stopped

  api:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"   # host:container — 8090 al host, 8080 dentro

  worker:
    restart: unless-stopped

  web:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:80"     # host:container — 8091 al host, 80 dentro
