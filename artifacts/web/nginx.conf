# Sirve el SPA generado por Vite bajo el subpath /evidencias.
# El Nginx del host (deploy/nginx/rcoloma.dev.conf) hace `proxy_pass` aquí.

server {
    listen       80;
    server_name  _;
    server_tokens off;

    # Tipos MIME extendidos.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache largo para assets fingerprintados por Vite (hash en el filename).
    location /evidencias/assets/ {
        alias /usr/share/nginx/html/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta bajo /evidencias devuelve index.html.
    location /evidencias/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /evidencias/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Redirección de / → /evidencias/ por comodidad.
    location = / {
        return 302 /evidencias/;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
